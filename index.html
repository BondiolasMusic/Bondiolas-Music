<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music | Dynamic Style</title>
    <style>
        :root { 
            --primary: #004D09; 
            --primary-light: #007a0e;
            --fondo: #0a0a0a; 
            --tarjeta: rgba(255, 255, 255, 0.06); 
            --texto: #ffffff; 
            --texto-sec: #aaaaaa;
            /* Variable dinámica para la imagen del circulito */
            --thumb-url: url('image_7.png'); 
        }

        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding-bottom: 140px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-album-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.35;
            filter: blur(40px);
            transition: background 0.8s ease;
            background-size: cover;
            background-position: center;
        }

        header { 
            padding: 50px 40px 20px; 
            background: linear-gradient(to bottom, rgba(0,77,9,0.3), transparent);
        }

        .header-title { display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap; }
        h1 { font-size: 2.8rem; letter-spacing: -1px; margin: 0; font-weight: 800; }
        .subtitle { font-size: 1rem; opacity: 0.7; font-weight: 400; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 20px 40px; 
        }

        .card { 
            background: var(--tarjeta); 
            padding: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
        }

        .card:hover { 
            background: rgba(255, 255, 255, 0.12); 
            transform: translateY(-8px);
            border-color: var(--primary-light);
        }

        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .card-tit { margin-top: 15px; font-weight: 700; font-size: 1.05rem; }
        .card-art { color: var(--texto-sec); font-size: 0.85rem; margin-top: 4px; }

        #vista-album { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); z-index: 100; 
            overflow-y: auto; padding: 60px 40px;
            backdrop-filter: blur(25px);
        }

        .btn-back {
            background: var(--primary);
            border: none; color: #fff; padding: 12px 28px; 
            border-radius: 50px; cursor: pointer; font-weight: 700;
            margin-bottom: 30px; transition: 0.3s;
        }

        .song-item { display: flex; align-items: center; padding: 14px; border-radius: 10px; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.08); }

        .player { 
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 900px;
            background: rgba(18, 18, 18, 0.95); 
            backdrop-filter: blur(20px);
            padding: 15px 30px; 
            display: flex; flex-direction: column; gap: 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .p-main-content { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .p-info { display: flex; align-items: center; width: 35%; }
        .p-info img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; }

        .p-controls { display: flex; align-items: center; gap: 15px; }
        .control-btn { background: none; border: none; color: white; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .control-btn:hover { color: var(--primary-light); transform: scale(1.1); }
        .control-btn.active { color: var(--primary-light); text-shadow: 0 0 10px var(--primary); }

        .play-main {
            background: linear-gradient(45deg, var(--primary), var(--primary-light));
            color: white; width: 45px; height: 45px; border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0, 77, 9, 0.5); border: 2px solid rgba(255,255,255,0.2);
        }

        .p-icon-play, .p-icon-pause { display: none; }
        .playing .p-icon-pause { display: block; }
        .paused .p-icon-play { display: block; }

        .p-progress-container { display: flex; align-items: center; gap: 10px; width: 100%; }
        .time-display { font-size: 0.75rem; color: var(--texto-sec); width: 35px; text-align: center; }
        .p-progress-bar-wrapper { flex: 1; display: flex; align-items: center; position: relative; }

        input[type="range"]#p-progress-bar {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1); border-radius: 5px; outline: none; cursor: pointer;
        }

        /* --- CIRCULITO PERSONALIZABLE --- */
        input[type="range"]#p-progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--thumb-url) no-repeat center center; /* USANDO VARIABLE */
            background-size: cover;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            margin-top: -11px;
        }

        input[type="range"]#p-progress-bar::-moz-range-thumb {
            width: 28px; height: 28px;
            background: var(--thumb-url) no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            border: 2px solid white;
        }

        audio { display: none; }
    </style>
</head>
<body>

    <div id="bg-album-blur"></div>

    <div id="main-view">
        <header>
            <div class="header-title">
                <h1>Bondiolas Music</h1>
                <span class="subtitle">Bienvenido a la biblioteca de Bondiolas</span>
            </div>
        </header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button class="btn-back" onclick="cerrarAlbum()">← Volver</button>
        <div style="display:flex; gap:40px; align-items:flex-end; margin-bottom:40px; flex-wrap: wrap;">
            <img id="alb-img" src="" style="width:240px; height:240px; border-radius:15px;">
            <div>
                <span style="text-transform:uppercase; font-size:0.75rem; font-weight:900; color:var(--primary-light);">Álbum</span>
                <h2 id="alb-tit" style="font-size:3.5rem; margin:5px 0 15px 0;"></h2>
                <p id="alb-art" style="font-size:1.3rem; margin:0;"></p>
            </div>
        </div>
        <div id="lista-canciones" style="max-width: 850px; margin-top: 20px;"></div>
    </div>

    <div class="player">
        <div class="p-main-content">
            <div class="p-info">
                <img id="p-img" src="https://via.placeholder.com/50">
                <div style="overflow: hidden;">
                    <div id="p-tit" style="font-weight:700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.95rem;">Selecciona una canción</div>
                    <div id="p-art" style="color:var(--texto-sec); font-size:0.8rem;">Bondiolas Music</div>
                </div>
            </div>

            <div class="p-controls">
                <button class="control-btn" id="btn-loop" onclick="toggleLoop()">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
                <button class="control-btn play-main paused" id="btn-play" onclick="togglePlay()">
                    <svg class="p-icon-play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="p-icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>
            <div style="width:30%;"></div>
        </div>

        <div class="p-progress-container">
            <span id="current-time" class="time-display">0:00</span>
            <div class="p-progress-bar-wrapper">
                <input type="range" id="p-progress-bar" min="0" max="0" value="0">
            </div>
            <span id="total-duration" class="time-display">0:00</span>
        </div>
        <audio id="main-audio"></audio>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";
        
        // --- AQUÍ PEGA EL ENLACE DE LA PESTAÑA "CONFIG" ---
        const URL_CFG = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=1912040231&single=true&output=tsv"; 

        let albumes = [], canciones = [];
        const audio = document.getElementById('main-audio');
        const progressBar = document.getElementById('p-progress-bar');

        function limpiar(url, esAudio = false) {
            if (!url) return "";
            if (url.includes('github') || url.includes('raw')) return url.trim();
            const match = url.match(/(?:id=|\/d\/)([\w-]+)/);
            const id = match ? match[1] : url.trim();
            return esAudio ? `https://docs.google.com/uc?export=media&id=${id}` : `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
        }

        async function init() {
            try {
                const [resA, resC, resConfig] = await Promise.all([
                    fetch(URL_ALB), 
                    fetch(URL_CAN),
                    URL_CFG.startsWith('http') ? fetch(URL_CFG) : Promise.resolve(null)
                ]);

                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));

                // Cargar imagen del circulito desde Excel
                if (resConfig) {
                    const configData = (await resConfig.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                    if (configData[0] && configData[0][0]) {
                        const thumbUrlFinal = limpiar(configData[0][0]);
                        document.documentElement.style.setProperty('--thumb-url', `url('${thumbUrlFinal}')`);
                    }
                }

                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    grid.innerHTML += `<div class="card" onclick="verAlbum('${a[0].trim()}')"><img src="${limpiar(a[3])}"><div class="card-tit">${a[1]}</div><div class="card-art">${a[2]}</div></div>`;
                });
            } catch (e) { console.error("Error cargando datos", e); }
        }

        function sonar(t, art, url, img) {
            document.getElementById('p-tit').innerText = t;
            document.getElementById('p-art').innerText = art;
            const imgF = limpiar(img);
            document.getElementById('p-img').src = imgF;
            document.getElementById('bg-album-blur').style.backgroundImage = `url('${imgF}')`;
            audio.src = limpiar(url, true);
            audio.play();
            document.getElementById('btn-play').classList.replace('paused', 'playing');
        }

        function togglePlay() {
            const btn = document.getElementById('btn-play');
            if (audio.paused) { audio.play(); btn.classList.replace('paused', 'playing'); }
            else { audio.pause(); btn.classList.replace('playing', 'paused'); }
        }

        function toggleLoop() { audio.loop = !audio.loop; document.getElementById('btn-loop').classList.toggle('active'); }

        audio.ontimeupdate = () => {
            if (!isNaN(audio.duration)) {
                document.getElementById('current-time').innerText = formatTime(audio.currentTime);
                progressBar.value = audio.currentTime;
                const v = (progressBar.value / audio.duration) * 100;
                progressBar.style.background = `linear-gradient(to right, var(--primary-light) ${v}%, rgba(255,255,255,0.1) ${v}%)`;
            }
        };

        audio.onloadedmetadata = () => { progressBar.max = audio.duration; document.getElementById('total-duration').innerText = formatTime(audio.duration); };
        progressBar.oninput = () => { audio.currentTime = progressBar.value; };

        function formatTime(s) { const m = Math.floor(s/60); const ss = Math.floor(s%60); return `${m}:${ss<10?'0':''}${ss}`; }

        window.addEventListener('keydown', (e) => { if (e.code === "Space") { e.preventDefault(); togglePlay(); } });

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id.trim());
            const cans = canciones.filter(c => c[0].trim() == id.trim());
            document.getElementById('alb-img').src = limpiar(alb[3]);
            document.getElementById('alb-tit').innerText = alb[1];
            document.getElementById('alb-art').innerText = alb[2];
            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            cans.forEach((c, i) => {
                lista.innerHTML += `<div class="song-item" onclick="sonar('${c[1].replace(/'/g,"\\'")}', '${alb[2].replace(/'/g,"\\'")}', '${c[2]}', '${alb[3]}')"><div style="width:40px; opacity:0.4;">${i+1}</div><div style="flex:1;"><b>${c[1]}</b><br><small>${alb[2]}</small></div></div>`;
            });
            document.getElementById('vista-album').style.display = 'block';
        }

        function cerrarAlbum() { document.getElementById('vista-album').style.display = 'none'; }
        init();
    </script>
</body>
</html>
