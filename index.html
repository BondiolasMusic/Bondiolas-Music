<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music - Player</title>
    <style>
        :root { 
            --color-spotify: #1DB954; 
            --fondo: #000; 
            --tarjeta: #181818; 
            --texto: #fff; 
            --texto-sec: #b3b3b3;
        }
        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding-bottom: 110px; 
        }
        header { padding: 40px 20px; background: linear-gradient(#222, #000); }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        }
        .card { 
            background: var(--tarjeta); 
            padding: 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: background 0.3s, transform 0.3s; 
        }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 4px; 
            object-fit: cover; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.5); 
        }
        #vista-album { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 100; 
            overflow-y: auto; 
            padding: 40px 20px; 
        }
        .song-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .player { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #181818; 
            padding: 15px 25px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-top: 1px solid #282828; 
            box-sizing: border-box; 
        }
        audio { width: 45%; filter: invert(100%); }
        .btn-volver {
            background: none; 
            border: 1px solid #fff; 
            color: #fff; 
            padding: 8px 20px; 
            border-radius: 20px; 
            cursor: pointer; 
            margin-bottom: 20px;
        }
        .btn-volver:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div id="main-view">
        <header><h1>Mis Álbumes</h1></header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button class="btn-volver" onclick="cerrarAlbum()">← Volver</button>
        <div style="display:flex; gap:30px; align-items:flex-end; margin-bottom:30px; flex-wrap: wrap;">
            <img id="alb-img" src="" style="width:230px; height:230px; border-radius:8px; background:#222; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <div>
                <p style="text-transform: uppercase; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Álbum</p>
                <h2 id="alb-tit" style="font-size:3.5rem; margin:0; line-height: 1;"></h2>
                <p id="alb-art" style="font-weight: bold; margin-top: 10px;"></p>
            </div>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div style="display:flex; align-items:center; width:30%;">
            <img id="p-img" src="" style="width:55px; height:55px; border-radius:4px; margin-right:15px; background:#333;">
            <div style="overflow: hidden; white-space: nowrap;">
                <div id="p-tit" style="font-weight:bold; font-size:0.95rem; text-overflow: ellipsis; overflow: hidden;">Selecciona una canción</div>
                <div id="p-art" style="color:var(--texto-sec); font-size:0.8rem;">-</div>
            </div>
        </div>
        
        <audio id="main-audio" controls></audio>
        
        <div style="width:25%;"></div>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];

        // FUNCIÓN MEJORADA: Limpia el ID (quita el $ y otros símbolos) y genera el link de descarga
        function limpiar(valor, esAudio = false) {
            if (!valor) return "";
            
            // Buscamos el ID (cadena de letras y números de unos 33 caracteres)
            // Esto ignorará el símbolo '$' si está al principio.
            const match = valor.match(/([a-zA-Z0-9_-]{28,45})/);
            const id = match ? match[0] : valor.trim();

            if (esAudio) {
                // Formato que propusiste: descarga directa para que el reproductor lo lea como archivo
                return `https://docs.google.com/uc?export=download&id=${id}`;
            } else {
                // Miniatura de alta calidad para las portadas
                return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
            }
        }

        async function init() {
            try {
                const [resA, resC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));

                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    grid.innerHTML += `
                        <div class="card" onclick="verAlbum('${a[0].trim()}')">
                            <img src="${limpiar(a[3])}">
                            <div style="margin-top:12px; font-weight:bold;">${a[1]}</div>
                            <div style="color:var(--texto-sec); font-size:0.85rem;">${a[2]}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando la base de datos:", e); }
        }

        function verAlbum(idAlbum) {
            const alb = albumes.find(a => a[0].trim() == idAlbum.trim());
            const cans = canciones.filter(c => c[0].trim() == idAlbum.trim());
            
            document.getElementById('alb-img').src = limpiar(alb[3]);
            document.getElementById('alb-tit').innerText = alb[1];
            document.getElementById('alb-art').innerText = alb[2];
            
            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            cans.forEach((c, i) => {
                const tituloSafe = c[1].replace(/'/g, "\\'");
                const artistaSafe = alb[2].replace(/'/g, "\\'");
                lista.innerHTML += `
                    <div class="song-item" onclick="sonar('${tituloSafe}', '${artistaSafe}', '${c[2]}', '${alb[3]}')">
                        <div style="width:40px; color:var(--texto-sec); font-size: 0.9rem;">${i+1}</div>
                        <div>
                            <div style="font-weight:500;">${c[1]}</div>
                            <div style="font-size:0.85rem; color:var(--texto-sec);">${alb[2]}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('vista-album').style.display = 'block';
            window.scrollTo(0,0);
        }

        function sonar(titulo, artista, urlId, portadaId) {
            document.getElementById('p-tit').innerText = titulo;
            document.getElementById('p-art').innerText = artista;
            document.getElementById('p-img').src = limpiar(portadaId);
            
            const audio = document.getElementById('main-audio');
            const urlFinal = limpiar(urlId, true);
            
            console.log("Reproduciendo canción de:", urlFinal);
            
            audio.pause();
            audio.src = urlFinal;
            audio.load(); // Fuerza al navegador a reconocer el nuevo archivo
            
            audio.play().catch(error => {
                console.error("Error al reproducir audio:", error);
                alert("No se pudo cargar el audio. Asegúrate de que el archivo en Drive sea PÚBLICO (Cualquier persona con el enlace).");
            });
        }

        function cerrarAlbum() { document.getElementById('vista-album').style.display = 'none'; }
        
        init();
    </script>
</body>
</html>
