<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music | Biblioteca</title>
    <style>
        :root { 
            --primary: #004D09; 
            --primary-light: #007a0e;
            --fondo: #080808; 
            --tarjeta: rgba(255, 255, 255, 0.05); 
            --texto: #ffffff; 
            --texto-sec: #b0b0b0;
        }

        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding-bottom: 140px; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO DINÁMICO (DESENFOQUE REDUCIDO) */
        #bg-album-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.4;
            filter: blur(15px); /* Desenfoque bajo para que se note la portada */
            transition: background 1s ease;
            background-size: cover;
            background-position: center;
        }

        header { 
            padding: 50px 40px 30px; 
            background: linear-gradient(to bottom, rgba(0,77,9,0.3), transparent);
        }

        .header-title { display: flex; align-items: baseline; gap: 15px; }
        h1 { font-size: 2.8rem; letter-spacing: -1.5px; margin: 0; font-weight: 800; }
        .subtitle { font-size: 1rem; opacity: 0.6; font-weight: 400; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 0 40px; 
        }

        .card { 
            background: var(--tarjeta); 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s; 
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
        }

        .card:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .card-tit { margin-top: 12px; font-weight: 700; font-size: 1rem; }
        .card-art { color: var(--texto-sec); font-size: 0.85rem; }

        /* VISTA DETALLE ÁLBUM */
        #vista-album { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); z-index: 100; 
            overflow-y: auto; padding: 60px 40px;
            backdrop-filter: blur(20px);
        }

        .btn-back {
            background: var(--primary);
            border: none; color: #fff; padding: 10px 25px; 
            border-radius: 30px; cursor: pointer; font-weight: 700;
            margin-bottom: 30px; transition: 0.2s;
        }
        .btn-back:hover { transform: scale(1.05); background: var(--primary-light); }

        .song-item { 
            display: flex; align-items: center; padding: 12px; 
            border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background: rgba(255,255,255,0.1); }

        /* NUEVO REPRODUCTOR CUSTOM */
        .player-bar { 
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 95%; max-width: 1000px;
            background: rgba(15, 15, 15, 0.9); 
            backdrop-filter: blur(20px);
            padding: 15px 25px; 
            display: flex; align-items: center; 
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            z-index: 1000;
        }

        .p-info { display: flex; align-items: center; width: 30%; min-width: 200px; }
        .p-info img { width: 55px; height: 55px; border-radius: 8px; margin-right: 15px; border: 1px solid var(--primary); }
        .p-txt { overflow: hidden; }
        .p-txt div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .p-controls { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .p-buttons { display: flex; align-items: center; gap: 20px; }
        
        .play-btn {
            background: var(--primary);
            border: none; width: 45px; height: 45px;
            border-radius: 50%; color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.1); background: var(--primary-light); }

        .progress-container { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 500px; }
        .time-txt { font-size: 0.75rem; color: var(--texto-sec); width: 35px; }
        
        input[type="range"] {
            flex: 1; height: 4px; cursor: pointer;
            accent-color: var(--primary-light);
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }

        .volume-container { width: 15%; display: flex; align-items: center; gap: 10px; justify-content: flex-end; }

        /* Estilo Scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="bg-album-blur"></div>

    <div id="main-view">
        <header>
            <div class="header-title">
                <h1>Bondiolas Music</h1>
                <span class="subtitle">Bienvenido a la biblioteca de Bondiolas</span>
            </div>
        </header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button class="btn-back" onclick="cerrarAlbum()">← Volver</button>
        <div style="display:flex; gap:40px; align-items:flex-end; margin-bottom:40px; flex-wrap: wrap;">
            <img id="alb-img" src="" style="width:250px; height:250px; border-radius:15px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);">
            <div>
                <p style="text-transform:uppercase; font-size:0.8rem; font-weight:800; color:var(--primary-light); letter-spacing: 2px; margin-bottom: 5px;">Álbum</p>
                <h2 id="alb-tit" style="font-size:4rem; margin:0; line-height: 1;"></h2>
                <p id="alb-art" style="font-size:1.4rem; margin-top:10px; opacity:0.8;"></p>
            </div>
        </div>
        <div id="lista-canciones" style="max-width: 900px;"></div>
    </div>

    <div class="player-bar">
        <div class="p-info">
            <img id="p-img" src="">
            <div class="p-txt">
                <div id="p-tit" style="font-weight:700;">Selecciona algo</div>
                <div id="p-art" style="color:var(--texto-sec); font-size:0.85rem;">Bondiolas Music</div>
            </div>
        </div>

        <div class="p-controls">
            <div class="p-buttons">
                <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            </div>
            <div class="progress-container">
                <span class="time-txt" id="currentTime">0:00</span>
                <input type="range" id="seekSlider" value="0" step="1" oninput="seekAudio()">
                <span class="time-txt" id="totalTime">0:00</span>
            </div>
        </div>

        <div class="volume-container">
            <span style="font-size: 1rem;">🔈</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" oninput="changeVolume()" style="width: 70px;">
        </div>

        <audio id="main-audio"></audio>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('playBtn');
        const seekSlider = document.getElementById('seekSlider');
        const currentTimeTxt = document.getElementById('currentTime');
        const totalTimeTxt = document.getElementById('totalTime');

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        async function init() {
            try {
                const [resA, resC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));

                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    const id = a[0].trim();
                    const img = a[3].trim();
                    grid.innerHTML += `
                        <div class="card" onclick="verAlbum('${id}')">
                            <img src="${img}">
                            <div class="card-tit">${a[1]}</div>
                            <div class="card-art">${a[2]}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando base"); }
        }

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id.trim());
            const cans = canciones.filter(c => c[0].trim() == id.trim());
            document.getElementById('alb-img').src = alb[3];
