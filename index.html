<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music</title>
    <style>
        :root { --color-principal: #1DB954; --fondo: #000; --texto: #fff; --texto-dim: #b3b3b3; }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        header { padding: 40px 20px; background: linear-gradient(#333, #000); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 4px; object-fit: cover; }
        #vista-album { display: none; position: fixed; inset: 0; background: #000; z-index: 100; overflow-y: auto; padding: 20px; }
        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 4px; cursor: pointer; }
        .song-item:hover { background: #282828; }
        .player { position: fixed; bottom: 0; width: 100%; background: #181818; padding: 15px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; }
        audio { filter: invert(100%); width: 50%; }
    </style>
</head>
<body>

    <div id="main-view">
        <header><h1>Bondiolas Music</h1></header>
        <div id="grid-albumes" class="grid"></div>
    </div>

    <div id="vista-album">
        <button onclick="cerrarAlbum()" style="background: white; border: none; padding: 10px; border-radius: 20px; cursor: pointer;">← Volver</button>
        <div id="header-album" style="display: flex; gap: 20px; margin: 20px 0; align-items: flex-end;">
            <img id="alb-img" src="" style="width: 200px; border-radius: 8px;">
            <h2 id="alb-tit" style="font-size: 3rem; margin: 0;"></h2>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div style="width: 20%;">
            <div id="p-tit" style="font-weight: bold;">Selecciona una canción</div>
            <div id="p-art" style="color: var(--texto-dim); font-size: 0.8rem;">-</div>
        </div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        const URL_ALBUMES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CANCIONES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];

        function limpiar(url) {
            if (!url) return "";
            let id = url.includes("id=") ? url.split("id=")[1].split("&")[0] : url.split("/d/")[1]?.split("/")[0];
            return id ? `https://docs.google.com/uc?export=download&id=${id}` : url;
        }

        async function cargar() {
            const [ra, rc] = await Promise.all([fetch(URL_ALBUMES), fetch(URL_CANCIONES)]);
            albumes = (await ra.text()).split("\n").slice(1).map(l => l.split("\t"));
            canciones = (await rc.text()).split("\n").slice(1).map(l => l.split("\t"));
            
            const grid = document.getElementById("grid-albumes");
            albumes.forEach(a => {
                if(!a[1]) return;
                grid.innerHTML += `<div class="card" onclick="verAlbum('${a[0].trim()}')">
                    <img src="${limpiar(a[3])}">
                    <div style="margin-top:10px; font-weight:bold;">${a[1]}</div>
                </div>`;
            });
        }

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id);
            document.getElementById("alb-img").src = limpiar(alb[3]);
            document.getElementById("alb-tit").innerText = alb[1];
            const lista = document.getElementById("lista-canciones");
            lista.innerHTML = "";
            canciones.filter(c => c[0].trim() == id).forEach(c => {
                lista.innerHTML += `<div class="song-item" onclick="sonar('${c[1]}', '${alb[2]}', '${c[2]}')">
                    <span style="margin-right:15px; color:#b3b3b3;">▶</span>
                    <div>${c[1]}</div>
                </div>`;
            });
            document.getElementById("vista-album").style.display = "block";
        }

        function sonar(tit, art, url) {
            document.getElementById("p-tit").innerText = tit;
            document.getElementById("p-art").innerText = art;
            const a = document.getElementById("main-audio");
            a.src = limpiar(url);
            a.play();
        }

        function cerrarAlbum() { document.getElementById("vista-album").style.display = "none"; }
        
        cargar();
    </script>
</body>
</html>
