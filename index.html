<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music</title>
    <style>
        :root { --color: #1DB954; --fondo: #000; --tarjeta: #181818; --texto: #fff; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 110px; }
        header { padding: 40px 20px; background: linear-gradient(#222, #000); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--tarjeta); padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 4px; object-fit: cover; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        #vista-album { display: none; position: fixed; inset: 0; background: #000; z-index: 100; overflow-y: auto; padding: 40px 20px; }
        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 5px; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .player { position: fixed; bottom: 0; width: 100%; background: #181818; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #282828; box-sizing: border-box; }
        audio { width: 40%; filter: invert(100%); }
    </style>
</head>
<body>

    <div id="main-view">
        <header><h1>Mis Álbumes</h1></header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button onclick="cerrarAlbum()" style="background:none; border:1px solid #fff; color:#fff; padding:8px 20px; border-radius:20px; cursor:pointer; margin-bottom:20px;">← Volver</button>
        <div style="display:flex; gap:30px; align-items:flex-end; margin-bottom:30px;">
            <img id="alb-img" src="" style="width:200px; height:200px; border-radius:8px; background:#222;">
            <div><h2 id="alb-tit" style="font-size:3rem; margin:0;"></h2><p id="alb-art" style="color:#b3b3b3;"></p></div>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div style="display:flex; align-items:center; width:30%;">
            <img id="p-img" src="" style="width:50px; height:50px; border-radius:4px; margin-right:15px; background:#333;">
            <div><div id="p-tit" style="font-weight:bold; font-size:0.9rem;">Selecciona algo</div><div id="p-art" style="color:#b3b3b3; font-size:0.75rem;">-</div></div>
        </div>
        <audio id="main-audio" controls></audio>
        <div style="width:30%;"></div>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];

        function limpiar(url, esAudio = false) {
            if (!url) return "";
            // Esta nueva expresión regular ignora símbolos como $ o espacios al inicio del ID
            const match = url.match(/(?:id=|d\/)([\w-]{25,})/);
            const id = match ? match[1] : "";
            
            if (!id) return url.trim();

            if (esAudio) {
                // Usamos drive.google.com que suele ser más estable para streaming directo
                return `https://drive.google.com/uc?export=media&id=${id}`;
            } else {
                return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
            }
        }

        async function init() {
            try {
                const [resA, resC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));

                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    grid.innerHTML += `
                        <div class="card" onclick="verAlbum('${a[0].trim()}')">
                            <img src="${limpiar(a[3])}">
                            <div style="margin-top:10px; font-weight:bold;">${a[1]}</div>
                            <div style="color:#b3b3b3; font-size:0.85rem;">${a[2]}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando datos"); }
        }

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id.trim());
            if (!alb) return;
            const cans = canciones.filter(c => c[0].trim() == id.trim());
            
            document.getElementById('alb-img').src = limpiar(alb[3]);
            document.getElementById('alb-tit').innerText = alb[1];
            document.getElementById('alb-art').innerText = alb[2];
            
            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            cans.forEach((c, i) => {
                // Evitamos errores con nombres que tengan comillas
                const titSafe = c[1].replace(/'/g, "\\'");
                const artSafe = alb[2].replace(/'/g, "\\'");
                const urlSafe = c[2].trim();
                const imgSafe = alb[3].trim();

                lista.innerHTML += `
                    <div class="song-item" onclick="sonar('${titSafe}', '${artSafe}', '${urlSafe}', '${imgSafe}')">
                        <div style="width:30px; color:#b3b3b3;">${i+1}</div>
                        <div>
                            <div style="font-weight:500;">${c[1]}</div>
                            <div style="font-size:0.8rem; color:#b3b3b3;">${alb[2]}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('vista-album').style.display = 'block';
        }

        function sonar(t, art, url, img) {
            document.getElementById('p-tit').innerText = t;
            document.getElementById('p-art').innerText = art;
            document.getElementById('p-img').src = limpiar(img);
            
            const audio = document.getElementById('main-audio');
            const finalUrl = limpiar(url, true);
            
            console.log("Intentando reproducir:", finalUrl); // Para debug en consola
            
            audio.pause();
            audio.src = finalUrl;
            audio.load();
            
            audio.play().catch(e => {
                console.error("Error crítico de reproducción:", e);
                alert("No se pudo reproducir la canción. Revisa que el archivo en Drive sea PÚBLICO.");
            });
        }

        function cerrarAlbum() { document.getElementById('vista-album').style.display = 'none'; }
        init();
    </script>
</body>
</html>
