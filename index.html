<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music - Player Pro</title>
    <style>
        :root { 
            --primary: #004D09; 
            --primary-hover: #007a0e;
            --fondo: #000; 
            --tarjeta: #181818; 
            --texto: #fff; 
            --texto-sec: #b3b3b3;
        }
        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding-bottom: 120px; 
        }
        header { padding: 40px 20px; background: linear-gradient(#222, #000); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--tarjeta); padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 4px; object-fit: cover; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        
        #vista-album { 
            display: none; position: fixed; inset: 0; background: #000; z-index: 100; 
            overflow-y: auto; padding: 40px 20px; 
        }

        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 5px; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.1); }

        /* REPRODUCTOR MEJORADO */
        .player { 
            position: fixed; bottom: 0; width: 100%; 
            background: #121212; 
            padding: 15px 25px; 
            display: flex; align-items: center; 
            justify-content: space-between; 
            border-top: 1px solid #282828; 
            box-sizing: border-box; 
            z-index: 200;
        }

        .p-info { display: flex; align-items: center; width: 30%; }
        .p-info img { width: 55px; height: 55px; border-radius: 4px; margin-right: 15px; background: #333; }
        
        .p-controls { 
            display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px;
        }

        .control-buttons { display: flex; align-items: center; gap: 20px; }

        .btn-play { 
            background: #fff; border: none; width: 40px; height: 40px; 
            border-radius: 50%; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-play:hover { transform: scale(1.1); }
        .btn-play svg { width: 20px; fill: #000; }

        .btn-loop { 
            background: none; border: none; cursor: pointer; color: var(--texto-sec); 
            transition: 0.3s; padding: 5px;
        }
        .btn-loop.active { color: var(--primary); }
        .btn-loop svg { width: 22px; fill: currentColor; }

        /* Ocultamos el audio original pero lo dejamos para la lógica */
        #main-audio { display: none; }

        .btn-volver {
            background: none; border: 1px solid #fff; color: #fff; 
            padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="main-view">
        <header><h1>Bondiolas Music</h1></header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button class="btn-volver" onclick="cerrarAlbum()">← Volver</button>
        <div style="display:flex; gap:30px; align-items:flex-end; margin-bottom:30px; flex-wrap: wrap;">
            <img id="alb-img" src="" style="width:200px; height:200px; border-radius:8px;">
            <div><h2 id="alb-tit" style="font-size:3rem; margin:0;"></h2><p id="alb-art" style="color:var(--texto-sec);"></p></div>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div class="p-info">
            <img id="p-img" src="">
            <div>
                <div id="p-tit" style="font-weight:bold; font-size:0.9rem;">Selecciona una canción</div>
                <div id="p-art" style="color:var(--texto-sec); font-size:0.75rem;">-</div>
            </div>
        </div>

        <div class="p-controls">
            <div class="control-buttons">
                <button id="btn-loop" class="btn-loop" title="Repetir">
                    <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>

                <button id="btn-play-pause" class="btn-play">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" style="display:none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>
            <audio id="main-audio"></audio>
        </div>

        <div style="width:30%;"></div>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('btn-play-pause');
        const loopBtn = document.getElementById('btn-loop');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        function limpiar(url) {
            if (!url) return "";
            if (url.includes('github') || url.includes('raw')) return url.trim();
            const id = url.match(/id=([\w-]+)/);
            return id ? `https://drive.google.com/thumbnail?id=${id[1]}&sz=w800` : url;
        }

        async function init() {
            try {
                const [resA, resC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));

                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    grid.innerHTML += `
                        <div class="card" onclick="verAlbum('${a[0].trim()}')">
                            <img src="${limpiar(a[3])}">
                            <div style="margin-top:10px; font-weight:bold;">${a[1]}</div>
                            <div style="color:var(--texto-sec); font-size:0.85rem;">${a[2]}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando datos"); }
        }

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id.trim());
            const cans = canciones.filter(c => c[0].trim() == id.trim());
            document.getElementById('alb-img').src = limpiar(alb[3]);
            document.getElementById('alb-tit').innerText = alb[1];
            document.getElementById('alb-art').innerText = alb[2];
            
            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            cans.forEach((c, i) => {
                const tit = c[1].replace(/'/g, "\\'");
                const art = alb[2].replace(/'/g, "\\'");
                lista.innerHTML += `
                    <div class="song-item" onclick="sonar('${tit}', '${art}', '${c[2]}', '${alb[3]}')">
                        <div style="width:30px; color:var(--texto-sec);">${i+1}</div>
                        <div><div style="font-weight:500;">${c[1]}</div><div style="font-size:0.8rem; color:var(--texto-sec);">${alb[2]}</div></div>
                    </div>`;
            });
            document.getElementById('vista-album').style.display = 'block';
        }

        function sonar(t, art, url, img) {
            document.getElementById('p-tit').innerText = t;
            document.getElementById('p-art').innerText = art;
            document.getElementById('p-img').src = limpiar(img);
            
            audio.src = url.trim();
            audio.play();
            actualizarIconos(true);
        }

        // LÓGICA DE CONTROL DE REPRODUCCIÓN
        function togglePlay() {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play();
                actualizarIconos(true);
            } else {
                audio.pause();
                actualizarIconos(false);
            }
        }

        function actualizarIconos(jugando) {
            playIcon.style.display = jugando ? 'none' : 'block';
            pauseIcon.style.display = jugando ? 'block' : 'none';
        }

        playBtn.onclick = togglePlay;

        // BOTÓN BUCLE
        loopBtn.onclick = () => {
            audio.loop = !audio.loop;
            loopBtn.classList.toggle('active', audio.loop);
        };

        // ACCESO DIRECTO TECLA ESPACIO
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Evita que la página baje al apretar espacio
                togglePlay();
            }
        });

        function cerrarAlbum() { document.getElementById('vista-album').style.display = 'none'; }
        init();
    </script>
</body>
</html>
