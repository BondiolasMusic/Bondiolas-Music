<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow - Mi Drive</title>
    <style>
        :root {
            --color-principal: #1DB954; /* Cambiá este color aquí */
            --fondo: #000000;
            --fondo-secundario: #121212;
            --fondo-tarjeta: #181818;
            --texto: #ffffff;
            --texto-dim: #b3b3b3;
        }

        body {
            background-color: var(--fondo);
            color: var(--texto);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding-bottom: 110px;
        }

        header { padding: 30px 20px; background: linear-gradient(to bottom, #222, var(--fondo)); }
        
        .container { padding: 0 20px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Estilo Tarjeta Álbum */
        .card {
            background: var(--fondo-tarjeta);
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img {
            width: 100%; aspect-ratio: 1;
            object-fit: cover; border-radius: 4px; margin-bottom: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        .card .title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; }
        .card .artist { color: var(--texto-dim); font-size: 0.85rem; }

        /* Modal / Lista de canciones */
        #vista-album {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fondo); z-index: 100; overflow-y: auto;
            padding: 40px 20px;
        }
        .btn-volver {
            background: none; border: 1px solid white; color: white;
            padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-bottom: 20px;
        }

        .song-item {
            display: flex; align-items: center; padding: 10px;
            border-radius: 5px; cursor: pointer;
        }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .song-item .num { width: 30px; color: var(--texto-dim); }
        .song-item .details { flex-grow: 1; }

        /* Reproductor */
        .player {
            position: fixed; bottom: 0; width: 100%;
            background: #181818; border-top: 1px solid #282828;
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
        }
        .player-info { display: flex; align-items: center; width: 30%; }
        .player-info img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; }
        audio { width: 40%; }
    </style>
</head>
<body>

    <div id="main-view">
        <header>
            <h1>Mis Álbumes</h1>
        </header>
        <div class="container">
            <div id="grid-albumes" class="grid">
                </div>
        </div>
    </div>

    <div id="vista-album">
        <button class="btn-volver" onclick="cerrarAlbum()">← Volver</button>
        <div style="display: flex; gap: 30px; margin-bottom: 30px; align-items: flex-end;">
            <img id="album-cover-grande" src="" style="width: 200px; height: 200px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <div>
                <p style="text-transform: uppercase; font-size: 12px; font-weight: bold;">Álbum</p>
                <h2 id="album-titulo-grande" style="font-size: 3rem; margin: 0;"></h2>
                <p id="album-artista-grande" style="color: var(--texto-dim);"></p>
            </div>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div class="player-info">
            <img id="p-img" src="https://via.placeholder.com/50">
            <div>
                <div id="p-titulo" style="font-weight: bold; font-size: 0.9rem;">Selecciona algo</div>
                <div id="p-artista" style="color: var(--texto-dim); font-size: 0.75rem;">-</div>
            </div>
        </div>
        <audio id="main-audio" controls></audio>
        <div style="width: 30%;"></div>
    </div>

    <script>
        // CONFIGURACIÓN:
        // Debes publicar AMBAS pestañas de tu Google Sheets como TSV.
        // Copia el enlace de "Publicar en la web" -> Pestaña "Albumes" -> TSV
        const URL_ALBUMES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        // Copia el enlace de "Publicar en la web" -> Pestaña "Canciones" -> TSV
        const URL_CANCIONES = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let dataAlbumes = [];
        let dataCanciones = [];

        async function init() {
            try {
                // Cargamos ambos archivos
                const resAlb = await fetch(URL_ALBUMES);
                const resCan = await fetch(URL_CANCIONES);
                
                const txtAlb = await resAlb.text();
                const txtCan = await resCan.text();

                // Parsear Albumes
                dataAlbumes = parseTSV(txtAlb);
                // Parsear Canciones
                dataCanciones = parseTSV(txtCan);

                renderizarInicio();
            } catch (e) { alert("Error cargando base de datos"); }
        }

        function parseTSV(text) {
            const lines = text.split('\n');
            return lines.slice(1).filter(l => l.trim()).map(line => line.split('\t'));
        }

        function renderizarInicio() {
            const grid = document.getElementById('grid-albumes');
            grid.innerHTML = '';
            dataAlbumes.forEach(alb => {
                grid.innerHTML += `
                    <div class="card" onclick="verAlbum('${alb[0]}')">
                        <img src="${alb[3]}">
                        <div class="title">${alb[1]}</div>
                        <div class="artist">${alb[2]}</div>
                    </div>
                `;
            });
        }

        function verAlbum(id) {
            const album = dataAlbumes.find(a => a[0].trim() == id.trim());
            const canciones = dataCanciones.filter(c => c[0].trim() == id.trim());

            document.getElementById('album-cover-grande').src = album[3];
            document.getElementById('album-titulo-grande').innerText = album[1];
            document.getElementById('album-artista-grande').innerText = album[2];

            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            canciones.forEach((c, index) => {
                lista.innerHTML += `
                    <div class="song-item" onclick="reproducir('${c[1]}', '${album[2]}', '${c[2]}', '${album[3]}')">
                        <div class="num">${index + 1}</div>
                        <div class="details">
                            <div style="font-weight: 500;">${c[1]}</div>
                            <div style="font-size: 0.8rem; color: var(--texto-dim);">${album[2]}</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('vista-album').style.display = 'block';
        }

        function cerrarAlbum() { document.getElementById('vista-album').style.display = 'none'; }

        function reproducir(titulo, artista, url, img) {
            document.getElementById('p-titulo').innerText = titulo;
            document.getElementById('p-artista').innerText = artista;
            document.getElementById('p-img').src = img;
            const audio = document.getElementById('main-audio');
            audio.src = url;
            audio.play();
        }

        init();
    </script>
</body>
</html>
