<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music</title>
    <style>
        :root { --color: #1DB954; --fondo: #000; --texto: #fff; }
        body { background: var(--fondo); color: var(--texto); font-family: sans-serif; margin: 0; padding-bottom: 110px; }
        header { padding: 30px; background: linear-gradient(#222, #000); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 8px; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 4px; object-fit: cover; background: #333; }
        #vista-album { display: none; position: fixed; inset: 0; background: #000; z-index: 100; overflow-y: auto; padding: 30px; }
        .song-item { display: flex; align-items: center; padding: 12px; border-radius: 4px; cursor: pointer; border-bottom: 1px solid #222; }
        .player { position: fixed; bottom: 0; width: 100%; background: #181818; padding: 15px; display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #333; box-sizing: border-box; }
        audio { width: 60%; filter: invert(100%); }
    </style>
</head>
<body>

    <div id="main-view">
        <header><h1>Bondiolas Music</h1></header>
        <div id="grid-albumes" class="grid"></div>
    </div>

    <div id="vista-album">
        <button onclick="cerrarAlbum()" style="padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px;">← Volver</button>
        <div style="display: flex; gap: 30px; align-items: flex-end; margin-bottom: 30px;">
            <img id="alb-img" src="" style="width: 200px; height: 200px; border-radius: 8px; object-fit: cover;">
            <h2 id="alb-tit" style="font-size: 3rem; margin: 0;"></h2>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div style="width: 25%;">
            <div id="p-tit" style="font-weight: bold;">Selecciona algo</div>
            <div id="p-art" style="color: #b3b3b3; font-size: 0.8rem;">-</div>
        </div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let dataA = [], dataC = [];

        function obtenerID(url) {
            if (!url) return "";
            if (url.includes("id=")) return url.split("id=")[1].split("&")[0];
            if (url.includes("/d/")) return url.split("/d/")[1].split("/")[0];
            return "";
        }

        // CAMBIO SOLICITADO: Usando el proxy de perfiles de Google para las fotos
        function limpiarImagen(url) {
            const id = obtenerID(url);
            if (!id) return url;
            return `https://lh3.googleusercontent.com/d/?url=https://docs.google.com/uc?export=download%26id=${id}`;
        }

        function limpiarAudio(url) {
            const id = obtenerID(url);
            if (!id) return url;
            // Para audio usamos export=media que es el estándar de streaming para Drive
            return `https://docs.google.com/uc?export=media&id=${id}`;
        }

        async function init() {
            try {
                const [rA, rC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                dataA = (await rA.text()).split("\n").slice(1).map(l => l.split("\t"));
                dataC = (await rC.text()).split("\n").slice(1).map(l => l.split("\t"));
                render();
            } catch (e) { console.error("Error al cargar datos"); }
        }

        function render() {
            const grid = document.getElementById("grid-albumes");
            grid.innerHTML = "";
            dataA.forEach(a => {
                if(!a[1]) return;
                grid.innerHTML += `<div class="card" onclick="ver('${a[0].trim()}')">
                    <img src="${limpiarImagen(a[3])}">
                    <div style="margin-top:10px; font-weight:bold;">${a[1]}</div>
                </div>`;
            });
        }

        function ver(id) {
            const a = dataA.find(x => x[0].trim() == id);
            document.getElementById("alb-img").src = limpiarImagen(a[3]);
            document.getElementById("alb-tit").innerText = a[1];
            const lista = document.getElementById("lista-canciones");
            lista.innerHTML = "";
            dataC.filter(x => x[0].trim() == id).forEach(c => {
                lista.innerHTML += `<div class="song-item" onclick="sonar('${c[1].replace(/'/g, "\\'")}', '${a[2].replace(/'/g, "\\'")}', '${c[2]}')">
                    <span style="margin-right:15px; color:var(--color);">▶</span>
                    <div>${c[1]}</div>
                </div>`;
            });
            document.getElementById("vista-album").style.display = "block";
        }

        function sonar(t, art, url) {
            document.getElementById("p-tit").innerText = t;
            document.getElementById("p-art").innerText = art;
            const audio = document.getElementById("main-audio");
            audio.src = limpiarAudio(url);
            audio.load();
            audio.play();
        }

        function cerrarAlbum() { document.getElementById("vista-album").style.display = "none"; }
        init();
    </script>
</body>
</html>
