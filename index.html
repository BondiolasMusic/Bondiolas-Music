<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music | Premium Player</title>
    <style>
        :root { 
            --primary: #004D09; 
            --primary-light: #007a0e;
            --fondo: #0a0a0a; 
            --tarjeta: rgba(255, 255, 255, 0.06); 
            --texto: #ffffff; 
            --texto-sec: #aaaaaa;
        }

        body { 
            background: var(--fondo); 
            color: var(--texto); 
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            padding-bottom: 140px; /* Espacio extra para el player */
            min-height: 100vh;
            overflow-x: hidden;
        }

        #bg-album-blur {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.35;
            filter: blur(40px);
            transition: background 0.8s ease;
            background-size: cover;
            background-position: center;
        }

        header { 
            padding: 50px 40px 20px; 
            background: linear-gradient(to bottom, rgba(0,77,9,0.3), transparent);
        }

        .header-title { display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap; }
        h1 { font-size: 2.8rem; letter-spacing: -1px; margin: 0; font-weight: 800; }
        .subtitle { font-size: 1rem; opacity: 0.7; font-weight: 400; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 20px 40px; 
        }

        .card { 
            background: var(--tarjeta); 
            padding: 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(5px);
        }

        .card:hover { 
            background: rgba(255, 255, 255, 0.12); 
            transform: translateY(-8px);
            border-color: var(--primary-light);
        }

        .card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .card-tit { margin-top: 15px; font-weight: 700; font-size: 1.05rem; }
        .card-art { color: var(--texto-sec); font-size: 0.85rem; margin-top: 4px; }

        #vista-album { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.85); z-index: 100; 
            overflow-y: auto; padding: 60px 40px;
            backdrop-filter: blur(25px);
        }

        .btn-back {
            background: var(--primary);
            border: none; color: #fff; padding: 12px 28px; 
            border-radius: 50px; cursor: pointer; font-weight: 700;
            margin-bottom: 30px; transition: 0.3s;
        }

        .song-item { display: flex; align-items: center; padding: 14px; border-radius: 10px; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.08); }

        /* --- REPRODUCTOR PREMIUM ACTUALIZADO --- */
        .player { 
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%);
            width: 92%; max-width: 900px;
            background: rgba(18, 18, 18, 0.95); 
            backdrop-filter: blur(20px);
            padding: 15px 30px; 
            display: flex; flex-direction: column; gap: 10px; /* Cambiado a columna para la barra */
            border-radius: 20px; /* Bordes menos redondeados, más modernos */
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .p-main-content {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%;
        }

        .p-info { display: flex; align-items: center; width: 35%; }
        .p-info img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }

        .p-controls { display: flex; align-items: center; gap: 15px; }
        
        .control-btn {
            background: none; border: none; color: white; cursor: pointer;
            font-size: 1.2rem; transition: 0.2s; display: flex; align-items: center; justify-content: center;
            opacity: 0.7; /* Más sutil por defecto */
        }
        
        .control-btn:hover { color: var(--primary-light); transform: scale(1.1); opacity: 1; }
        .control-btn.active { color: var(--primary-light); text-shadow: 0 0 10px var(--primary); opacity: 1; }

        /* Botón Play/Pause Principal */
        .play-main {
            background: linear-gradient(45deg, var(--primary), var(--primary-light));
            color: white; width: 45px; height: 45px;
            border-radius: 50%; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0, 77, 9, 0.5);
            border: 2px solid rgba(255,255,255,0.2);
            opacity: 1;
        }
        .play-main:hover {
            box-shadow: 0 6px 15px rgba(0, 77, 9, 0.7);
            background: linear-gradient(45deg, var(--primary-light), var(--primary));
        }

        /* Ocultar iconos de texto nativos */
        .p-icon-play, .p-icon-pause { display: none; }
        
        /* Mostrar el icono correcto según el estado */
        .playing .p-icon-pause { display: block; }
        .paused .p-icon-play { display: block; }

        /* --- BARRA DE PROGRESO PREMIUM --- */
        .p-progress-container {
            display: flex; align-items: center; gap: 10px; width: 100%;
        }

        .time-display {
            font-size: 0.75rem; color: var(--texto-sec); width: 35px; text-align: center; font-variant-numeric: tabular-nums;
        }

        .p-progress-bar-wrapper {
            flex: 1; display: flex; align-items: center; position: relative;
        }

        input[type="range"]#p-progress-bar {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px; outline: none; cursor: pointer;
            position: relative; z-index: 1;
        }

        /* El truco del gradiente dinámico para el llenado (se actualiza en JS) */
        input[type="range"]#p-progress-bar::-webkit-slider-runnable-track {
            background: transparent;
        }

        /* El circulito (Thumb) usando image_7.png */
        input[type="range"]#p-progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 25px; height: 25px; /* Ajustar tamaño */
            border-radius: 50%;
            background: url('image_7.png') no-repeat center center; /* Usar imagen */
            background-size: cover;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            border: 2px solid white; /* Un borde para integrarlo */
            margin-top: -9.5px; /* Centrar verticalmente */
            position: relative; z-index: 2;
        }

        /* Para Firefox */
        input[type="range"]#p-progress-bar::-moz-range-thumb {
            width: 25px; height: 25px;
            background: url('image_7.png') no-repeat center center;
            background-size: cover;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        audio { display: none; } /* Oculto */

        /* Estética de scroll */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

    </style>
</head>
<body>

    <div id="bg-album-blur"></div>

    <div id="main-view">
        <header>
            <div class="header-title">
                <h1>Bondiolas Music</h1>
                <span class="subtitle">Bienvenido a la biblioteca de Bondiolas</span>
            </div>
        </header>
        <div class="grid" id="grid-albumes"></div>
    </div>

    <div id="vista-album">
        <button class="btn-back" onclick="cerrarAlbum()">← Volver</button>
        <div style="display:flex; gap:40px; align-items:flex-end; margin-bottom:40px; flex-wrap: wrap;">
            <img id="alb-img" src="" style="width:240px; height:240px; border-radius:15px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);">
            <div>
                <span style="text-transform:uppercase; font-size:0.75rem; font-weight:900; color:var(--primary-light); letter-spacing: 2px;">Álbum</span>
                <h2 id="alb-tit" style="font-size:3.5rem; margin:5px 0 15px 0; line-height: 1;"></h2>
                <p id="alb-art" style="font-size:1.3rem; margin:0; opacity:0.9;"></p>
            </div>
        </div>
        <div id="lista-canciones" style="max-width: 850px; margin-top: 20px;"></div>
    </div>

    <div class="player">
        <div class="p-main-content">
            <div class="p-info">
                <img id="p-img" src="https://via.placeholder.com/50">
                <div style="overflow: hidden;">
                    <div id="p-tit" style="font-weight:700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.95rem;">Selecciona una canción</div>
                    <div id="p-art" style="color:var(--texto-sec); font-size:0.8rem;">Bondiolas Music</div>
                </div>
            </div>

            <div class="p-controls">
                <button class="control-btn" id="btn-loop" onclick="toggleLoop()" title="Repetir (Bucle)">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                </button>
                
                <button class="control-btn play-main paused" id="btn-play" onclick="togglePlay()">
                    <svg class="p-icon-play" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="p-icon-pause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>

            <div style="width:30%;"></div> </div>

        <div class="p-progress-container">
            <span id="current-time" class="time-display">0:00</span>
            <div class="p-progress-bar-wrapper">
                <input type="range" id="p-progress-bar" min="0" max="0" value="0">
            </div>
            <span id="total-duration" class="time-display">0:00</span>
        </div>

        <audio id="main-audio"></audio>
    </div>

    <script>
        const URL_ALB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=0&single=true&output=tsv";
        const URL_CAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSeiWFIXNf9Xvg2kBMH9VUoQzZzpAAVmcXg2T6PtO-gip5nj0sx2QlTF2LKNHerqqvM2TJZnjLfeGz/pub?gid=92592278&single=true&output=tsv";

        let albumes = [], canciones = [];
        const audio = document.getElementById('main-audio');
        const btnPlay = document.getElementById('btn-play');
        const btnLoop = document.getElementById('btn-loop');
        const currentTimeDisplay = document.getElementById('current-time');
        const totalDurationDisplay = document.getElementById('total-duration');
        const progressBar = document.getElementById('p-progress-bar');

        function limpiar(url, esAudio = false) {
            if (!url) return "";
            if (url.includes('github') || url.includes('raw')) return url.trim();
            const match = url.match(/(?:id=|\/d\/)([\w-]+)/);
            const id = match ? match[1] : url.trim();
            return esAudio 
                ? `https://docs.google.com/uc?export=media&id=${id}`
                : `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
        }

        async function init() {
            try {
                const [resA, resC] = await Promise.all([fetch(URL_ALB), fetch(URL_CAN)]);
                albumes = (await resA.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                canciones = (await resC.text()).split(/\r?\n/).slice(1).filter(l => l.trim()).map(l => l.split('\t'));
                const grid = document.getElementById('grid-albumes');
                grid.innerHTML = '';
                albumes.forEach(a => {
                    grid.innerHTML += `
                        <div class="card" onclick="verAlbum('${a[0].trim()}')">
                            <img src="${limpiar(a[3])}">
                            <div class="card-tit">${a[1]}</div>
                            <div class="card-art">${a[2]}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando base de datos"); }
        }

        function verAlbum(id) {
            const alb = albumes.find(a => a[0].trim() == id.trim());
            const cans = canciones.filter(c => c[0].trim() == id.trim());
            document.getElementById('alb-img').src = limpiar(alb[3]);
            document.getElementById('alb-tit').innerText = alb[1];
            document.getElementById('alb-art').innerText = alb[2];
            const lista = document.getElementById('lista-canciones');
            lista.innerHTML = '';
            cans.forEach((c, i) => {
                const tit = c[1].replace(/'/g, "\\'");
                const art = alb[2].replace(/'/g, "\\'");
                lista.innerHTML += `
                    <div class="song-item" onclick="sonar('${tit}', '${art}', '${c[2]}', '${alb[3]}')">
                        <div style="width:40px; opacity:0.4; font-weight:bold;">${i+1}</div>
                        <div style="flex:1;">
                            <div style="font-weight:600;">${c[1]}</div>
                            <div style="font-size:0.8rem; color:var(--texto-sec);">${alb[2]}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('vista-album').style.display = 'block';
            document.getElementById('vista-album').scrollTo(0,0);
        }

        function sonar(t, art, url, img) {
            document.getElementById('p-tit').innerText = t;
            document.getElementById('p-art').innerText = art;
            const imgFinal = limpiar(img);
            document.getElementById('p-img').src = imgFinal;
            
            // CAMBIO DE FONDO DINÁMICO
            document.getElementById('bg-album-blur').style.backgroundImage = `url('${imgFinal}')`;
            
            audio.src = limpiar(url, true);
            
            // Reset de barra y tiempos antes de reproducir
            currentTimeDisplay.innerText = "0:00";
            progressBar.value = 0;
            progressBar.style.background = `linear-gradient(to right, var(--primary-light) 0%, rgba(255, 255, 255, 0.1) 0%)`;
            
            audio.play().then(() => {
                // Actualizar icono al iniciar
                btnPlay.classList.remove('paused');
                btnPlay.classList.add('playing');
            }).catch(e => console.log("Play bloqueado por navegador"));
        }

        // --- CONTROLES Y BARRA DE PROGRESO ACTUALIZADOS ---

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                btnPlay.classList.remove('paused');
                btnPlay.classList.add('playing');
            } else {
                audio.pause();
                btnPlay.classList.remove('playing');
                btnPlay.classList.add('paused');
            }
        }

        function toggleLoop() {
            audio.loop = !audio.loop;
            btnLoop.classList.toggle('active');
        }

        // Función auxiliar para formatear tiempo (m:ss)
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Actualizar barra y tiempo actual durante la reproducción
        audio.ontimeupdate = () => {
            if (!isNaN(audio.duration)) {
                currentTimeDisplay.innerText = formatTime(audio.currentTime);
                progressBar.value = audio.currentTime;
                
                // Efecto de llenado dinámico de la barra
                const value = (progressBar.value - progressBar.min) / (progressBar.max - progressBar.min) * 100;
                progressBar.style.background = `linear-gradient(to right, var(--primary-light) 0%, var(--primary-light) ${value}%, rgba(255, 255, 255, 0.1) ${value}%, rgba(255, 255, 255, 0.1) 100%)`;
            }
        };

        // Obtener y mostrar duración total cuando carga la canción
        audio.onloadedmetadata = () => {
            if (!isNaN(audio.duration)) {
                totalDurationDisplay.innerText = formatTime(audio.duration);
                progressBar.max = audio.duration;
            }
        };

        // Permitir que el usuario busque en la canción arrastrando la barra
        progressBar.oninput = () => {
            audio.currentTime = progressBar.value;
            currentTimeDisplay.innerText = formatTime(progressBar.value);
            
            // Actualizar llenado mientras arrastra
            const value = (progressBar.value - progressBar.min) / (progressBar.max - progressBar.min) * 100;
            progressBar.style.background = `linear-gradient(to right, var(--primary-light) 0%, var(--primary-light) ${value}%, rgba(255, 255, 255, 0.1) ${value}%, rgba(255, 255, 255, 0.1) 100%)`;
        };

        // --- TECLA ESPACIO Y FINALIZACIÓN ---

        // Control por teclado (Espacio para Play/Pausa)
        window.addEventListener('keydown', (e) => {
            // Evitar conflictos si el usuario está en un input (por si acaso agregas uno luego)
            if (e.target.tagName !== 'INPUT' || e.target.type !== 'range') { 
                if (e.code === "Space") {
                    e.preventDefault(); // Evita scroll
                    togglePlay();
                }
            }
        });

        // Actualizar icono si la música termina y no hay bucle
        audio.onended = () => { 
            if(!audio.loop) {
                btnPlay.classList.remove('playing');
                btnPlay.classList.add('paused');
            } 
        };

        function cerrarAlbum() { 
            document.getElementById('vista-album').style.display = 'none'; 
        }

        init();
    </script>
</body>
</html>
