<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondiolas Music</title>
    <style>
        :root {
            --color-principal: #1DB954;
            --fondo: #000000;
            --fondo-secundario: #121212;
            --fondo-tarjeta: #181818;
            --texto: #ffffff;
            --texto-dim: #b3b3b3;
        }
        body { background-color: var(--fondo); color: var(--texto); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        header { padding: 30px 20px; background: linear-gradient(to bottom, #222, var(--fondo)); }
        .container { padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--fondo-tarjeta); padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; margin-bottom: 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .card .title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .artist { color: var(--texto-dim); font-size: 0.85rem; }
        #vista-album { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 100; overflow-y: auto; padding: 40px 20px; box-sizing: border-box; }
        .btn-volver { background: none; border: 1px solid white; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; }
        .song-item { display: flex; align-items: center; padding: 10px; border-radius: 5px; cursor: pointer; }
        .song-item:hover { background: rgba(255,255,255,0.1); }
        .song-item .num { width: 30px; color: var(--texto-dim); }
        .song-item .details { flex-grow: 1; }
        .player { position: fixed; bottom: 0; width: 100%; background: #181818; border-top: 1px solid #282828; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 200; box-sizing: border-box; }
        .player-info { display: flex; align-items: center; width: 30%; }
        .player-info img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        audio { width: 40%; }
    </style>
</head>
<body>
    <div id="main-view">
        <header><h1>Mis Álbumes</h1></header>
        <div class="container"><div id="grid-albumes" class="grid"></div></div>
    </div>

    <div id="vista-album">
        <button class="btn-volver" onclick="cerrarAlbum()">← Volver</button>
        <div style="display: flex; flex-wrap: wrap; gap: 30px; margin-bottom: 30px; align-items: flex-end;">
            <img id="album-cover-grande" src="" style="width: 200px; height: 200px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); object-fit: cover;">
            <div>
                <p style="text-transform: uppercase; font-size: 12px; font-weight: bold; margin: 0;">Álbum</p>
                <h2 id="album-titulo-grande" style="font-size: 3rem; margin: 0;"></h2>
                <p id="album-artista-grande" style="color: var(--texto-dim); font-size: 1.2rem;"></p>
            </div>
        </div>
        <div id="lista-canciones"></div>
    </div>

    <div class="player">
        <div class="player-info">
            <img id="p-img" src="https://via.placeholder.com/50">
            <div style="overflow: hidden;">
                <div id="p-titulo" style="font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Selecciona algo</div>
                <div id="p-artista" style="color: var(--texto-dim); font-size: 0.75rem;">-</div>
            </div>
        </div>
        <audio id="main-audio" controls></audio>
        <div style="width: 30%;"></div>
    </div>
